<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eteya — Hero (Video + Gradient)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --accent: #C8FF00;
      --black: #121213;
    }

    body { background: #080808; }

    .hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      background-color: var(--accent);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* Video — täcker höger halva */
    .hero-video-wrap {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 55%;
      z-index: 1;
      overflow: hidden;
    }
    .hero-video-wrap video {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
    }
    .hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to right,
        var(--accent) 0%,
        rgba(200,255,0,0.85) 15%,
        rgba(200,255,0,0.4) 40%,
        rgba(200,255,0,0) 70%
      );
      pointer-events: none;
    }

    /* Nav spacer */
    .hero-spacer { height: 4.5rem; }

    /* Namn — centrerat */
    .hero-name-wrap {
      position: relative; z-index: 10;
      display: flex;
      align-items: center;
      padding: 0 0 0 2.5rem;
      overflow: visible;
    }

    .hero-role {
      margin-bottom: 0.75rem;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: clamp(0.7rem, 1vw, 0.85rem);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(0,0,0,0.55);
    }

    .hero-eteya {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(5rem, 12vw, 14rem);
      color: var(--black);
      text-transform: uppercase;
      line-height: 0.85;
      letter-spacing: -0.04em;
      white-space: nowrap;
      display: flex;
    }
    .hero-eteya span {
      display: inline-block;
    }

    /* Bottom bar */
    .hero-bottom {
      position: relative; z-index: 10;
      padding: 2rem 2.5rem 3.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 2rem;
    }
    .hero-subheadline {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(1.1rem, 1.8vw, 1.6rem);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(0,0,0,0.75);
      max-width: 36rem;
      line-height: 1.2;
    }

    /* Mobile */
    @media (max-width: 767px) {
      .hero-video-wrap { left: 0; right: 0; width: 100%; }
      .hero-gradient { display: none; }
      .hero-name-wrap {
        align-items: center; justify-content: center;
        padding: 0 1.5rem;
      }
      .hero-name-wrap > div {
        display: flex; flex-direction: column;
        align-items: center; text-align: center; width: 100%;
      }
      .hero-eteya { font-size: 28vw; justify-content: center; }
      .hero-subheadline { text-align: center; }
    }

    /* GSAP letter animation */
    .hero-eteya span {
      opacity: 0;
      transform: translateY(60px);
      animation: letterReveal 1s ease forwards;
    }
    @keyframes letterReveal {
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-eteya span:nth-child(1) { animation-delay: 0.3s; }
    .hero-eteya span:nth-child(2) { animation-delay: 0.35s; }
    .hero-eteya span:nth-child(3) { animation-delay: 0.4s; }
    .hero-eteya span:nth-child(4) { animation-delay: 0.45s; }
    .hero-eteya span:nth-child(5) { animation-delay: 0.5s; }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-spacer"></div>

  <!-- Video bakgrund -->
  <div class="hero-video-wrap">
    <video autoplay loop muted playsinline>
      <source src="../../public/hero.mp4" type="video/mp4">
    </video>
    <div class="hero-gradient"></div>
  </div>

  <!-- Namn -->
  <div class="hero-name-wrap">
    <div>
      <div class="hero-role">AI-BYRÅ FÖR TILLVÄXTBOLAG</div>
      <div class="hero-eteya">
        <span>E</span><span>T</span><span>E</span><span>Y</span><span>A</span>
      </div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="hero-bottom">
    <p class="hero-subheadline">Vi bygger AI-system som gör jobbet — så du kan fokusera på tillväxt.</p>
  </div>
</section>

</body>
</html>
