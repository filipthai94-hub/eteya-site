<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filip Thai — VD & Grundare, Eteya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow_Condensed:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --primary: #F5F5F5;
    --secondary: #9B9B9B;
    --accent: #C8FF00;
    --border: #222222;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background-color: var(--bg);
    color: var(--primary);
    font-family: 'Geist', sans-serif;
    letter-spacing: -0.01em;
    line-height: 1.75;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background-color: var(--bg);
  }

  /* BEAMS BACKGROUND - från case study sidor */
  .hero-beams {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(200,255,0,0.15) 0%, rgba(8,8,8,0) 70%);
    pointer-events: none;
    z-index: 1;
  }
  
  .hero-beams::before {
    content: '';
    position: absolute;
    inset: -50%;
    background: conic-gradient(from 0deg at 50% 50%, 
      rgba(200,255,0,0) 0deg, 
      rgba(200,255,0,0.03) 20deg, 
      rgba(200,255,0,0) 40deg,
      rgba(200,255,0,0.03) 60deg,
      rgba(200,255,0,0) 80deg,
      rgba(200,255,0,0.03) 100deg,
      rgba(200,255,0,0) 120deg,
      rgba(200,255,0,0.03) 140deg,
      rgba(200,255,0,0) 160deg,
      rgba(200,255,0,0.03) 180deg,
      rgba(200,255,0,0) 200deg,
      rgba(200,255,0,0.03) 220deg,
      rgba(200,255,0,0) 240deg,
      rgba(200,255,0,0.03) 260deg,
      rgba(200,255,0,0) 280deg,
      rgba(200,255,0,0.03) 300deg,
      rgba(200,255,0,0) 320deg,
      rgba(200,255,0,0.03) 340deg,
      rgba(200,255,0,0) 360deg);
    animation: rotateBeams 20s linear infinite;
  }
  
  @keyframes rotateBeams {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, 40px); }
  }

  .hero-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 2rem;
  }

  /* Profile Image */
  .profile-image-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto 3rem;
    opacity: 0;
    transform: scale(0.95);
  }

  .profile-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    border: 2px solid rgba(200,255,0,0.3);
    background: linear-gradient(135deg, rgba(200,255,0,0.1) 0%, rgba(200,255,0,0.05) 100%);
  }

  .profile-glow {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,255,0,0.2) 0%, transparent 70%);
    animation: pulse 4s ease-in-out infinite;
    z-index: -1;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.05); }
  }

  /* Name & Title */
  .hero-role {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
    font-size: clamp(0.875rem, 1.2vw, 1.1rem);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    margin-bottom: 1rem;
    opacity: 0;
    transform: translateY(16px);
  }

  .hero-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: clamp(4rem, 10vw, 10rem);
    text-transform: uppercase;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--primary);
    opacity: 0;
    transform: translateY(20px);
    margin-bottom: 0.5rem;
  }

  .hero-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: clamp(1rem, 1.5vw, 1.25rem);
    color: rgba(255,255,255,0.6);
    opacity: 0;
    transform: translateY(20px);
  }

  /* CONTACT SECTION */
  .contact-section {
    padding: 6rem 2rem;
    max-width: 600px;
    margin: 0 auto;
  }

  .contact-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    padding: 1.5rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: all 0.2s ease;
    text-decoration: none;
    color: var(--primary);
    opacity: 0;
    transform: translateY(20px);
  }

  .contact-item:first-child {
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .contact-item:hover {
    padding-left: 1rem;
    background: rgba(255,255,255,0.01);
  }

  .contact-item-icon {
    width: 24px;
    height: 24px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .contact-item-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.25rem;
  }

  .contact-item-value {
    font-family: 'Geist', sans-serif;
    font-weight: 500;
    font-size: 1.125rem;
  }

  /* SOCIAL LINKS */
  .social-section {
    padding: 4rem 2rem;
    text-align: center;
  }

  .social-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1.5rem;
  }

  .social-links {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
  }

  .social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    transition: all 0.3s ease;
    text-decoration: none;
    opacity: 0;
    transform: translateY(20px);
  }

  .social-link:hover {
    background: rgba(200,255,0,0.1);
    border-color: rgba(200,255,0,0.3);
    color: var(--accent);
    transform: translateY(-4px);
  }

  .social-icon {
    width: 24px;
    height: 24px;
  }

  /* CTA BUTTONS */
  .cta-section {
    padding: 3rem 2rem 6rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 1.25rem 2.5rem;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    border: none;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    min-width: 280px;
    opacity: 0;
    transform: translateY(20px);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, #A8E600 100%);
    color: var(--bg);
  }

  .btn-primary:hover {
    transform: translateY(-24px);
    box-shadow: 0 12px 30px rgba(200,255,0,0.3);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.03);
    color: var(--primary);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-24px);
  }

  .btn-icon {
    width: 20px;
    height: 20px;
  }

  /* FOOTER */
  .footer {
    padding: 2rem;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.4);
    font-size: 0.875rem;
  }

  .footer a {
    color: rgba(255,255,255,0.5);
    text-decoration: none;
  }

  .footer a:hover {
    color: var(--accent);
  }

  /* MOBILE */
  @media (max-width: 767px) {
    .hero {
      min-height: 600px;
    }

    .profile-image-wrapper {
      width: 220px;
      height: 220px;
      margin: 0 auto 2rem;
    }

    .contact-section {
      padding: 4rem 1.5rem;
    }

    .contact-item {
      padding: 1.25rem 0;
    }

    .contact-item-value {
      font-size: 1rem;
    }

    .btn {
      width: 100%;
      max-width: 320px;
    }

    .social-links {
      gap: 1rem;
    }

    .social-link {
      width: 48px;
      height: 48px;
    }
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-beams"></div>

  <div class="hero-content">
    <div class="profile-image-wrapper">
      <div class="profile-glow"></div>
      <img 
        src="filip.png" 
        alt="Filip Thai" 
        class="profile-image"
      />
    </div>

    <div class="hero-role">VD & Grundare</div>

    <p class="hero-title">Eteya Consulting AB</p>
  </div>
</section>

<!-- CONTACT -->

      </svg>
      <div>
        <div class="contact-item-label">Website</div>
        <div class="contact-item-value">etea.ai</div>
      </div>
    </a>
  </div>
</section>

<!-- SOCIAL -->
<section class="social-section">
  <p class="social-label">Följ mig</p>
  <div class="social-links">
    <a href="https://linkedin.com/in/filip-thai-10449a3b6/" target="_blank" rel="noopener noreferrer" class="social-link" title="LinkedIn">

  </div>
</section>

<!-- CTA -->
<section class="cta-section">
  <a href="https://cal.com/filip" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
    <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>

  </a>
  <a href="/api/vcard/filip.vcf" download class="btn btn-secondary">
    <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Eteya Consulting AB — <a href="/sv/om-oss">Tillbaka till teamet</a></p>
</footer>

<script>
  gsap.registerPlugin(ScrollTrigger);

  // Hero animations
  const tl = gsap.timeline({ defaults: { ease: 'power4.out' } });

  tl.to('.profile-image-wrapper', {
    opacity: 1,
    scale: 1,
    duration: 1.2,
    ease: 'power3.out'
  })
  .to('.hero-role', {
    y: 0,
    opacity: 1,
    duration: 0.6
  }, '-=0.6')
  .to('.hero-name', {
    y: 0,
    opacity: 1,
    duration: 0.8
  }, '-=0.4')
  .to('.hero-title', {
    y: 0,
    opacity: 1,
    duration: 0.6
  }, '-=0.4');

  // Contact items stagger
  gsap.to('.contact-item', {
    opacity: 1,
    y: 0,
    duration: 0.6,
    stagger: 0.1,
    ease: 'power3.out',
    scrollTrigger: {
      trigger: '.contact-section',
      start: 'top 80%',
      once: true
    }
  });

  // Social links
  gsap.to('.social-link', {
    opacity: 1,
    y: 0,
    duration: 0.6,
    stagger: 0.15,
    ease: 'power3.out',
    scrollTrigger: {
      trigger: '.social-section',
      start: 'top 80%',
      once: true
    }
  });

  // CTA buttons
  gsap.to('.btn', {
    opacity: 1,
    y: 0,
    duration: 0.6,
    stagger: 0.2,
    ease: 'power3.out',
    scrollTrigger: {
      trigger: '.cta-section',
      start: 'top 80%',
      once: true
    }
  });
</script>

</body>
</html>
