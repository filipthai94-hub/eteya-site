<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandin Clone ג€” Image Section</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #080808; overflow-x: hidden; }

    /* ג”€ג”€ SPACER ג”€ג”€ */
    .spacer { height: 60vh; background: #080808; }

    /* ג”€ג”€ SECTION ג”€ג”€ */
    .brandin-section {
      position: relative;
      width: 100%;
      height: 75vh;
      overflow: hidden;
      background: #C8FF00;
    }

    /* ג”€ג”€ BAKGRUNDSBILD ג”€ג”€ */
    .brandin-bg {
      position: absolute;
      inset: -20% 0;
      width: 100%;
      height: 140%;
      background-image: url('./ai-bg.webp');
      background-size: cover;
      background-position: center center;
      will-change: transform;
      transform-origin: center center;
    }

    /* ג”€ג”€ GRADIENT ג”€ג”€ */
    .brandin-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 30%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.85) 100%);
      z-index: 1;
    }

    /* ג”€ג”€ TEXT ג”€ג”€ */
    .brandin-text {
      position: absolute;
      bottom: 4vw;
      left: 4vw;
      z-index: 2;
      overflow: hidden;
    }

    .brandin-label {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(12px, 1.4vw, 22px);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.65);
      margin-bottom: 12px;
      line-height: 1;
      opacity: 0;
      transform: translateY(10px);
    }

    /* Rubrik ג€” varje bokstav ֳ₪r ett span */
    .brandin-heading {
      font-family: 'DM Sans', sans-serif;
      font-size: 8vw;
      font-weight: 700;
      line-height: 0.88;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      display: block;
    }

    /* Varje char-wrapper clippar tecknet */
    .char-wrap {
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
    }

    .char-inner {
      display: inline-block;
      transform: translateY(110%);
      will-change: transform;
    }
  </style>
</head>
<body>

  <div class="spacer"></div>

  <div class="brandin-section">
    <div class="brandin-bg"></div>
    <div class="brandin-overlay"></div>
    <div class="brandin-text">
      <span class="brandin-label">// 01</span>
      <h1 class="brandin-heading" data-scramble="Kartlֳ₪ggning"></h1>
    </div>
  </div>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const section  = document.querySelector('.brandin-section');
    const bg       = document.querySelector('.brandin-bg');
    const label    = document.querySelector('.brandin-label');
    const heading  = document.querySelector('.brandin-heading');
    const text     = heading.dataset.scramble;

    /* ג”€ג”€ג”€ 1. BYGG LETTER-REVEAL MARKUP ג”€ג”€ג”€ג”€ג”€ג”€ג”€ג”€ג”€ג”€ג”€ג”€ג”€ג”€ג”€ */
    heading.innerHTML = text.split('').map(ch =>
      ch === ' '
        ? ' '
        : `<span class="char-wrap"><span class="char-inner">${ch}</span></span>`
    ).join('');
    const chars = heading.querySelectorAll('.char-inner');

    /* ג”€ג”€ג”€ 2. ZOOM-OUT: bild startar zoomad, zoomar ut ג”€ */
    gsap.fromTo(bg,
      { scale: 1.15 },
      {
        scale: 1,
        ease: 'power2.out',
        scrollTrigger: {
          trigger: section,
          start: 'top 90%',
          end: 'top 20%',
          scrub: 0.8,
        }
      }
    );

    /* ג”€ג”€ג”€ 3. PARALLAX: bild rֳ¶r sig lֳ¥ngsammare ג”€ג”€ג”€ג”€ג”€ג”€ג”€ג”€ */
    gsap.to(bg, {
      y: '15%',
      ease: 'none',
      scrollTrigger: {
        trigger: section,
        start: 'top bottom',
        end: 'bottom top',
        scrub: true,
      }
    });

    /* ג”€ג”€ג”€ 4. LETTER REVEAL ג€” bokstֳ₪ver glider upp ג”€ג”€ג”€ג”€ג”€ג”€ */
    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: section,
        start: 'top 75%',
        once: true,
      }
    });

    tl.to(label, {
      opacity: 1,
      y: 0,
      duration: 0.6,
      ease: 'power2.out',
    });

    tl.to(chars, {
      y: '0%',
      duration: 0.7,
      ease: 'power3.out',
      stagger: 0.035,
    }, '-=0.3');

    /* ג”€ג”€ג”€ 5. SCRAMBLE: tecken randomiseras ג†’ rֳ₪tt bokstav */
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZֳ…ֳ„ֳ–0123456789!@#$%';
    function scramble(el, finalText, duration = 1200, delay = 0) {
      const origChars = finalText.toUpperCase().split('');
      setTimeout(() => {
        origChars.forEach((ch, i) => {
          if (ch === ' ') return;
          let start = Date.now();
          const interval = setInterval(() => {
            const elapsed = Date.now() - start;
            const progress = Math.min(elapsed / duration, 1);
            // Rֳ₪tt bokstav lֳ¥ses in progressivt frֳ¥n vֳ₪nster
            if (progress > i / origChars.length) {
              el.querySelectorAll('.char-inner')[i].textContent = ch;
              clearInterval(interval);
            } else {
              el.querySelectorAll('.char-inner')[i].textContent =
                CHARS[Math.floor(Math.random() * CHARS.length)];
            }
          }, 50);
        });
      }, delay);
    }

    // Kֳ¶r scramble nֳ₪r sektionen scrollas in
    ScrollTrigger.create({
      trigger: section,
      start: 'top 75%',
      once: true,
      onEnter: () => scramble(heading, text, 1000, 200),
    });

  </script>
</body>
</html>
