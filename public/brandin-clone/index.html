<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandin Clone — Image Section</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #080808; overflow-x: hidden; }

    /* ── SPACER ── */
    .spacer { height: 60vh; background: #080808; }

    /* ── SECTION ── */
    .brandin-section {
      position: relative;
      width: 100%;
      height: 75vh;
      overflow: hidden;
      background: #C8FF00;
    }

    /* ── BAKGRUNDSBILD ── */
    .brandin-bg {
      position: absolute;
      inset: -20% 0;
      width: 100%;
      height: 140%;
      background-image: url('./ai-bg.webp');
      background-size: cover;
      background-position: center center;
      will-change: transform;
      transform-origin: center center;
    }

    /* ── GRADIENT ── */
    .brandin-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 30%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.85) 100%);
      z-index: 1;
    }

    /* ── TEXT ── */
    .brandin-text {
      position: absolute;
      bottom: 4vw;
      left: 4vw;
      z-index: 2;
      overflow: hidden;
    }

    .brandin-label {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(12px, 1.4vw, 22px);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.65);
      margin-bottom: 12px;
      line-height: 1;
      opacity: 0;
      transform: translateY(10px);
    }

    /* Rubrik — varje bokstav är ett span */
    .brandin-heading {
      font-family: 'DM Sans', sans-serif;
      font-size: 8vw;
      font-weight: 700;
      line-height: 0.88;
      color: #fff;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      display: block;
    }

    /* Varje char-wrapper clippar tecknet */
    .char-wrap {
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
      padding-top: 0.15em; /* Plats för diakritiska tecken (Ä Ö Å) */
      margin-top: -0.15em;
    }

    .char-inner {
      display: inline-block;
      transform: translateY(110%);
      will-change: transform;
    }
  </style>
</head>
<body>

  <div class="spacer"></div>

  <div class="brandin-section">
    <div class="brandin-bg"></div>
    <div class="brandin-overlay"></div>
    <div class="brandin-text">
      <span class="brandin-label">// 01</span>
      <h1 class="brandin-heading" data-scramble="KARTLÄGGNING"></h1>
    </div>
  </div>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const section  = document.querySelector('.brandin-section');
    const bg       = document.querySelector('.brandin-bg');
    const label    = document.querySelector('.brandin-label');
    const heading  = document.querySelector('.brandin-heading');
    const text     = heading.dataset.scramble;

    /* ─── 1. BYGG LETTER-REVEAL MARKUP ─────────────── */
    heading.innerHTML = [...text].map(ch =>
      ch === ' '
        ? ' '
        : `<span class="char-wrap"><span class="char-inner">${ch}</span></span>`
    ).join('');
    const chars = heading.querySelectorAll('.char-inner');

    /* ─── 2. ZOOM-OUT: bild startar zoomad, zoomar ut ─ */
    gsap.fromTo(bg,
      { scale: 1.15 },
      {
        scale: 1,
        ease: 'power2.out',
        scrollTrigger: {
          trigger: section,
          start: 'top 90%',
          end: 'top 20%',
          scrub: 0.8,
        }
      }
    );

    /* ─── 3. PARALLAX: bild rör sig långsammare ──────── */
    gsap.to(bg, {
      y: '15%',
      ease: 'none',
      scrollTrigger: {
        trigger: section,
        start: 'top bottom',
        end: 'bottom top',
        scrub: true,
      }
    });

    /* ─── 4. LETTER REVEAL — bokstäver glider upp ────── */
    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: section,
        start: 'top 75%',
        once: true,
      }
    });

    tl.to(label, {
      opacity: 1,
      y: 0,
      duration: 0.6,
      ease: 'power2.out',
    });

    tl.to(chars, {
      y: '0%',
      duration: 0.7,
      ease: 'power3.out',
      stagger: 0.035,
    }, '-=0.3');

    /* ─── 5. SCRAMBLE: tecken randomiseras → rätt bokstav */
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖabcdefghijklmnopqrstuvwxyzåäö0123456789';
    function scramble(el, finalText, duration = 1200, delay = 0) {
      // Använd originaltext (mixed case) — CSS text-transform: uppercase hanterar visningen
      const origChars = [...finalText.toUpperCase().replace('Ä','Ä').replace('Ö','Ö').replace('Å','Å')];
      const charEls = [...el.querySelectorAll('.char-inner')];
      setTimeout(() => {
        charEls.forEach((charEl, i) => {
          const finalChar = origChars[i];
          if (!finalChar || finalChar === ' ') return;
          let start = Date.now();
          const interval = setInterval(() => {
            const elapsed = Date.now() - start;
            const progress = Math.min(elapsed / duration, 1);
            if (progress > i / origChars.length) {
              charEl.textContent = finalChar; // Sätt rätt tecken — CSS gör uppercase
              clearInterval(interval);
            } else {
              charEl.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
            }
          }, 50);
        });
      }, delay);
    }

    // Kör scramble när sektionen scrollas in
    ScrollTrigger.create({
      trigger: section,
      start: 'top 75%',
      once: true,
      onEnter: () => scramble(heading, text, 1000, 200),
    });

  </script>
</body>
</html>
