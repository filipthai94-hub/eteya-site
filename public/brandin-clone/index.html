<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandin Clone — Image Section</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #080808; overflow-x: hidden; }

    /* ── SPACER OVANFÖR ── */
    .spacer {
      height: 60vh;
      background: #080808;
    }

    /* ── WRAPPER ── */
    .brandin-section {
      position: relative;
      width: 100%;
      height: 75vh;
      overflow: hidden;
      background: #C8FF00; /* Limegrön — syns bakom roboten där bilden är transparent */
    }

    /* ── BAKGRUNDSBILD ── */
    .brandin-bg {
      position: absolute;
      inset: -20% 0;
      width: 100%;
      height: 140%;
      background-image: url('./ai-bg.webp');
      background-size: cover;
      background-position: center center;
      will-change: transform;
    }

    /* ── GRADIENT DARKENING ── */
    .brandin-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 30%,
        rgba(0,0,0,0.5) 70%,
        rgba(0,0,0,0.85) 100%
      );
      z-index: 1;
    }

    /* ── TEXT LÄNGST NER VÄNSTER ── */
    .brandin-text {
      position: absolute;
      bottom: 4vw;
      left: 4vw;
      z-index: 2;
    }

    .brandin-label {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(12px, 1.4vw, 22px);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.65);
      margin-bottom: 12px;
      line-height: 1;
    }

    .brandin-heading {
      font-family: 'DM Sans', sans-serif;
      font-size: 8vw;
      font-weight: 700;
      line-height: 0.88;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="spacer"></div>

  <div class="brandin-section">
    <div class="brandin-bg"></div>
    <div class="brandin-overlay"></div>
    <div class="brandin-text">
      <span class="brandin-label">// 01</span>
      <h1 class="brandin-heading">Kartläggning</h1>
    </div>
  </div>

  <script>
    // Parallax
    const bg = document.querySelector('.brandin-bg');
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      bg.style.transform = `translateY(${y * 0.3}px)`;
    });
  </script>
</body>
</html>
