<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <title>OG Image Placeholder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #121212 0%, #1a1a1a 100%);
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    
    /* Lime accent */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200, 255, 0, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .tag {
      position: absolute;
      top: 60px;
      left: 60px;
      font-size: 14px;
      font-weight: 500;
      color: #C8FF00;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .logo {
      position: absolute;
      top: 60px;
      right: 60px;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.05em;
    }
    
    .logo span {
      color: #C8FF00;
    }
    
    .main-title {
      font-size: 72px;
      font-weight: 600;
      color: #ffffff;
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.1;
    }
    
    .highlight {
      font-size: 96px;
      font-weight: 700;
      background: linear-gradient(135deg, #C8FF00 0%, #b8ef00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      margin: 30px 0;
      line-height: 1;
    }
    
    .subtitle {
      font-size: 32px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      font-weight: 400;
    }
    
    .stats {
      display: flex;
      gap: 60px;
      margin-top: 60px;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 48px;
      font-weight: 700;
      color: #C8FF00;
      display: block;
    }
    
    .stat-label {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="tag">CASE STUDY</div>
  <div class="logo">ETEYA<span>.AI</span></div>
  
  <h1 class="main-title">Telestore Case Study</h1>
  <span class="highlight">390 000 kr/år</span>
  <p class="subtitle">i besparing med AI</p>
  
  <div class="stats">
    <div class="stat-item">
      <span class="stat-value">1 350h</span>
      <span class="stat-label">Sparad tid/år</span>
    </div>
    <div class="stat-item">
      <span class="stat-value">56</span>
      <span class="stat-label">Automationer</span>
    </div>
  </div>
</body>
</html>
